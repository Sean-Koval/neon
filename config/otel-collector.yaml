# OpenTelemetry Collector configuration for Neon platform
#
# Receives traces from all services (frontend, temporal workers, SDKs)
# and exports to ClickHouse for storage and analysis.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s
    send_batch_max_size: 2048

  memory_limiter:
    check_interval: 5s
    limit_mib: 256
    spike_limit_mib: 64

  attributes:
    actions:
      - key: neon.platform
        value: "true"
        action: upsert
      - key: deployment.environment
        value: "development"
        action: upsert

  # Redact common PII patterns from high-risk GenAI payload fields before export.
  # Adjust the target attribute list or regexes below if your deployment needs
  # stricter or looser masking semantics.
  transform/pii_redaction:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - replace_pattern(attributes["gen_ai.prompt"], "\\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,}\\b", "[REDACTED:email]")
          - replace_pattern(attributes["gen_ai.prompt"], "\\b\\d{3}-\\d{2}-\\d{4}\\b", "[REDACTED:ssn]")
          - replace_pattern(attributes["gen_ai.prompt"], "\\b(?:sk|pk)_(?:live|test|proj)?[_-]?[A-Za-z0-9_-]{16,}\\b", "[REDACTED:api_key]")
          - replace_pattern(attributes["gen_ai.completion"], "\\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,}\\b", "[REDACTED:email]")
          - replace_pattern(attributes["gen_ai.completion"], "\\b\\d{3}-\\d{2}-\\d{4}\\b", "[REDACTED:ssn]")
          - replace_pattern(attributes["gen_ai.completion"], "\\b(?:sk|pk)_(?:live|test|proj)?[_-]?[A-Za-z0-9_-]{16,}\\b", "[REDACTED:api_key]")
          - replace_pattern(attributes["tool.input"], "\\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,}\\b", "[REDACTED:email]")
          - replace_pattern(attributes["tool.input"], "\\b\\d{3}-\\d{2}-\\d{4}\\b", "[REDACTED:ssn]")
          - replace_pattern(attributes["tool.input"], "\\b(?:sk|pk)_(?:live|test|proj)?[_-]?[A-Za-z0-9_-]{16,}\\b", "[REDACTED:api_key]")
          - replace_pattern(attributes["tool.output"], "\\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,}\\b", "[REDACTED:email]")
          - replace_pattern(attributes["tool.output"], "\\b\\d{3}-\\d{2}-\\d{4}\\b", "[REDACTED:ssn]")
          - replace_pattern(attributes["tool.output"], "\\b(?:sk|pk)_(?:live|test|proj)?[_-]?[A-Za-z0-9_-]{16,}\\b", "[REDACTED:api_key]")
          - replace_pattern(attributes["gen_ai.input.messages"], "\\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,}\\b", "[REDACTED:email]")
          - replace_pattern(attributes["gen_ai.input.messages"], "\\b\\d{3}-\\d{2}-\\d{4}\\b", "[REDACTED:ssn]")
          - replace_pattern(attributes["gen_ai.input.messages"], "\\b(?:sk|pk)_(?:live|test|proj)?[_-]?[A-Za-z0-9_-]{16,}\\b", "[REDACTED:api_key]")
          - replace_pattern(attributes["gen_ai.output.messages"], "\\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,}\\b", "[REDACTED:email]")
          - replace_pattern(attributes["gen_ai.output.messages"], "\\b\\d{3}-\\d{2}-\\d{4}\\b", "[REDACTED:ssn]")
          - replace_pattern(attributes["gen_ai.output.messages"], "\\b(?:sk|pk)_(?:live|test|proj)?[_-]?[A-Za-z0-9_-]{16,}\\b", "[REDACTED:api_key]")
          - replace_pattern(attributes["retrieval.chunks"], "\\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,}\\b", "[REDACTED:email]")
          - replace_pattern(attributes["retrieval.chunks"], "\\b\\d{3}-\\d{2}-\\d{4}\\b", "[REDACTED:ssn]")
          - replace_pattern(attributes["retrieval.chunks"], "\\b(?:sk|pk)_(?:live|test|proj)?[_-]?[A-Za-z0-9_-]{16,}\\b", "[REDACTED:api_key]")
          - replace_pattern(attributes["neon.state_snapshots"], "\\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,}\\b", "[REDACTED:email]")
          - replace_pattern(attributes["neon.state_snapshots"], "\\b\\d{3}-\\d{2}-\\d{4}\\b", "[REDACTED:ssn]")
          - replace_pattern(attributes["neon.state_snapshots"], "\\b(?:sk|pk)_(?:live|test|proj)?[_-]?[A-Za-z0-9_-]{16,}\\b", "[REDACTED:api_key]")
          - replace_pattern(attributes["neon.artifacts"], "\\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\\.[A-Z]{2,}\\b", "[REDACTED:email]")
          - replace_pattern(attributes["neon.artifacts"], "\\b\\d{3}-\\d{2}-\\d{4}\\b", "[REDACTED:ssn]")
          - replace_pattern(attributes["neon.artifacts"], "\\b(?:sk|pk)_(?:live|test|proj)?[_-]?[A-Za-z0-9_-]{16,}\\b", "[REDACTED:api_key]")

  # Tail-sampling keeps the traces that operators most need during sustained
  # load: failures and slow traces. Everything else is retained at a lower
  # baseline rate to keep self-hosted storage and query cost under control.
  tail_sampling:
    decision_wait: 10s
    num_traces: 50000
    expected_new_traces_per_sec: 100
    policies:
      - name: keep-errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: keep-slow-traces
        type: latency
        latency:
          threshold_ms: ${env:NEON_TRACE_TAIL_SLOW_THRESHOLD_MS:-5000}
      - name: baseline-probabilistic
        type: probabilistic
        probabilistic:
          sampling_percentage: ${env:NEON_TRACE_TAIL_SAMPLING_PERCENT:-15}

exporters:
  # Direct ClickHouse exporter - uses its own OTel-managed tables
  # The primary path for trace ingestion is through the Neon API (otlphttp/neon-api)
  # which transforms OTel spans into Neon's schema (neon.traces / neon.spans).
  # This exporter serves as a backup with create_schema: true so it manages
  # its own otel_traces/otel_logs tables independently.
  clickhouse:
    endpoint: tcp://clickhouse:9000?dial_timeout=10s&compress=lz4
    database: neon
    ttl: 2160h # 90 days, matching existing TTL
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  otlphttp/neon-api:
    endpoint: http://web:3000/api/v1/traces
    headers:
      x-api-key: ${env:NEON_API_KEY:-neon-internal}
      x-workspace-id: ${env:DEFAULT_PROJECT_ID:-00000000-0000-0000-0000-000000000001}
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
    timeout: 30s

  # Kafka exporter - writes trace spans to Redpanda for high-throughput
  # batched ingestion by the trace consumer
  kafka:
    protocol_version: "3.0.0"
    brokers:
      - redpanda:9092
    topic: neon.traces.spans
    encoding: otlp_json
    producer:
      max_message_bytes: 1048576  # 1MB
      required_acks: 1
      compression: snappy
    retry_on_failure:
      enabled: true
      initial_interval: 200ms
      max_interval: 5s
    timeout: 10s

  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes, transform/pii_redaction, tail_sampling, batch]
      exporters: [otlphttp/neon-api, clickhouse, debug]
  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
